<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/signup.css" />
    <title>signup form</title>
  </head>
  <body>
    <div class="main-containier">
      <div class="left-container">
        <div class="image-container">
          <img
            src="../assets/signup-form/halie-west-25xggax4bSA-unsplash.jpg"
            alt="cover"
          />
        </div>
        <div class="logo">
          <img src="../assets/signup-form/odin-lined.png" alt="odin-logo" />
          <h1>ODIN</h1>
        </div>
        <div class="footer">
          <p>Photo by Halie West on onsplash</p>
        </div>
      </div>
      <div class="right-container">
        <div class="form-hero">
          <p>
            This is not a real online service! you know you need something like
            this in your life to help you realize your deepest dreams. <br />
            Sign up now to get started <br />
            <br />You know you want to.
          </p>
        </div>
        <div class="form-main">
          <p>Let's do this!</p>
          <form action="#">
            <div>
              <label for="firstname">First Name:</label>
              <input type="text" name="firstname" id="firstname" />
            </div>

            <div>
              <label for="lastname">Last Name:</label>
              <input type="text" name="lastname" id="lastname" />
            </div>

            <div>
              <label for="email">Email:</label>
              <input type="email" name="email" id="email" />
            </div>
            <div>
              <label for="phonenumber">Phone Number:</label>
              <input type="number" name="phonenumber" id="phonenumber" />
            </div>

            <div>
              <label for="pasword">Password:</label>
              <input type="password" name="password" id="password" />
            </div>

            <div>
              <label for="confirmpassword">Confirm Password:</label>
              <input
                type="password"
                name="confirmpassword"
                id="confirmpassword"
              />
            </div>
          </form>
        </div>
        <div class="form-footer">
          <div>
            <button>Create Account</button>
          </div>
          <p>Already have an account? <a href="#">Login</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
