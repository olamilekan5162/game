<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="../styles/tictactoe.css" />
    <script defer src="../scripts/tictactoe.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>✨ Tic Tac Toe ✨</h1>

      <div class="scoreboard">
        <div class="score-card">
          <h3>Player X</h3>
          <p class="player-x-score">0</p>
        </div>
        <div class="score-card draw">
          <h3>Draws</h3>
          <p class="draw-score">0</p>
        </div>
        <div class="score-card">
          <h3>Player O</h3>
          <p class="player-o-score">0</p>
        </div>
      </div>

      <div class="status">Player X's Turn</div>

      <div class="game-board">
        <div class="cell" id="0"></div>
        <div class="cell" id="1"></div>
        <div class="cell" id="2"></div>
        <div class="cell" id="3"></div>
        <div class="cell" id="4"></div>
        <div class="cell" id="5"></div>
        <div class="cell" id="6"></div>
        <div class="cell" id="7"></div>
        <div class="cell" id="8"></div>
        <div class="overlay"></div>
      </div>

      <div class="reset-container">
        <button class="reset-btn">Reset Board</button>
        <button class="new-btn">New Game</button>
      </div>
    </div>
  </body>
</html>
