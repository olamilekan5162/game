<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/rpc.css" />
    <title>Rock || Paper || Scissors</title>
  </head>
  <body>
    <div class="game_container">
      <h1 class="title">🎮 Rock Paper Scissors 🎮</h1>
      <div class="scores">
        <p>Player Score: <span id="p_score">0</span></p>
        <p><span id="c_score">0</span> Computer Score</p>
      </div>
      <h1 class="win">Choose your move!</h1>
      <div class="frame">
        <div class="player_frame">
          <img id="p_frame" src="../assets/rpc/p_rock.png" alt="pla" />
        </div>
        <div class="computer_frame">
          <img id="c_frame" src="../assets/rpc/c_rock.png" alt="com" />
        </div>
      </div>
      <p><b>Choose your move:</b> Rock paper or scissors</p>
      <div class="play_button">
        <button class="rpc">ROCK</button>
        <button class="rpc">PAPER</button>
        <button class="rpc">SCISSORS</button>
        <button class="new">PLAY AGAIN</button>
      </div>
    </div>
    <script src="../scripts/rpc.js"></script>
  </body>
</html>
